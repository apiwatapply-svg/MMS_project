name: MMS Dashboard CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "sqlserver://localhost:1433;database=ci;user=sa;password=Password123;trustServerCertificate=true"
      ENABLE_MACHINE_IO: "false"
      ENABLE_CRON_WORKER: "false"
      DEMO_AUTO_SEED_MSSQL: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: |
            backend/package-lock.json
            fontend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Check backend syntax
        working-directory: backend
        run: npm run lint

      - name: Generate Prisma client
        working-directory: backend
        run: npm run prisma:generate

      - name: Test OEE calc service
        working-directory: backend
        run: node tests/oeeCalcService.unit.js

      - name: Test actual output service
        working-directory: backend
        run: node tests/actualOutputService.unit.js

      - name: Test time utils
        working-directory: backend
        run: node tests/timeUtils.unit.js

      - name: Test memory OEE service
        working-directory: backend
        run: node tests/memoryOeeService.unit.js

      - name: Test cache service
        working-directory: backend
        run: node tests/cacheService.unit.js

      - name: Test plan config controller
        working-directory: backend
        run: node tests/planConfigController.unit.js

      - name: Test OEE update controller
        working-directory: backend
        run: node tests/oeeUpdateController.unit.js

      - name: Test auto-only policy
        working-directory: backend
        run: node tests/autoOnlyPolicy.unit.js

      - name: Test MQTT service
        working-directory: backend
        run: node tests/mqttService.unit.js

      - name: Test machine NG controller
        working-directory: backend
        run: node tests/machineNgController.unit.js

      - name: Test report dashboard service
        working-directory: backend
        run: node tests/reportDashboardService.unit.js

      - name: Test frontend display guards
        working-directory: backend
        run: node tests/frontendDisplay.unit.js

      - name: Run simulator unit tests
        working-directory: backend
        run: npm run test:sim

      - name: Run backend smoke test
        working-directory: backend
        run: npm run smoke

      - name: Install frontend dependencies
        working-directory: fontend
        run: npm ci

      - name: Lint frontend
        working-directory: fontend
        run: npm run lint

      - name: Build frontend
        working-directory: fontend
        run: npm run build

  deploy-production:
    needs: test-and-build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}

    steps:
      - name: Check deployment secrets
        id: deploy_config
        shell: bash
        run: |
          missing=0
          for name in DEPLOY_HOST DEPLOY_USER DEPLOY_PATH SSH_PRIVATE_KEY; do
            if [ -z "${!name}" ]; then
              echo "Missing secret: $name"
              missing=1
            fi
          done

          if [ "$missing" -eq 1 ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Deployment skipped because SSH deployment secrets are not fully configured."
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare SSH
        if: steps.deploy_config.outputs.enabled == 'true'
        shell: bash
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          if [ -n "$DEPLOY_KNOWN_HOSTS" ]; then
            printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > ~/.ssh/known_hosts
          else
            ssh-keyscan -p "${DEPLOY_PORT:-22}" "$DEPLOY_HOST" >> ~/.ssh/known_hosts
          fi

      - name: Deploy to PM2 server over SSH
        if: steps.deploy_config.outputs.enabled == 'true'
        shell: bash
        run: |
          ssh -i ~/.ssh/deploy_key \
            -p "${DEPLOY_PORT:-22}" \
            -o IdentitiesOnly=yes \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            "cd '$DEPLOY_PATH' && bash scripts/deploy_pm2.sh"
